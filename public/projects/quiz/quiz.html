<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="main-container">
        <!-- 1 -->
        <div class="question" id="divFirstQuestion">
            <div class="back-step">
                <img src="../images/1.png" alt="stepone">
            </div>
            <h2>Who is the author of the "Harry Potter" series?</h2>
            <label class="row">
                <input type="radio" name="questionOne">J.R.R. Tolkien
            </label>
            <label class="row">
                <input type="radio" name="questionOne">C.S. Lewis
            </label>
            <label class="row">
                <input type="radio" name="questionOne" id="answerThree">J.K. Rowling
            </label>
            <label class="row">
                <input type="radio" name="questionOne">Suzanne Collins
            </label>
        </div>

        <!-- 2 -->
        <div class="question" id="divSecondQuestion">
            <div class="back-step">
                <img src="../images/2.png" alt="steptwo">
            </div>
            <h2>Who wrote the novel "1984"?</h2>
            <label class="row">
                <input type="radio" name="questionTwo">Aldous Huxley
            </label>
            <label class="row">
                <input type="radio" name="questionTwo" id="answerTwo">George Orwell
            </label>
            <label class="row">
                <input type="radio" name="questionTwo">Ray Bradbury
            </label>
            <label class="row">
                <input type="radio" name="questionTwo">J.D. Salinger
            </label>
        </div>

        <!-- 3 -->
        <div class="question" id="divThirdQuestion">
            <div class="back-step">
                <img src="../images/3.png" alt="stepthree">
            </div>
            <h2>Who wrote the play "Hamlet"?</h2>
            <label class="row">
                <input type="radio" name="questionThree">Christopher Marlowe
            </label>
            <label class="row">
                <input type="radio" name="questionThree" id="answerFive">William Shakespeare
            </label>
            <label class="row">
                <input type="radio" name="questionThree">John Milton
            </label>
            <label class="row">
                <input type="radio" name="questionThree">Ben Jonson
            </label>
        </div>

        <!-- 4 -->
        <div class="question" id="divFourthQuestion">
            <div class="back-step">
                <img src="../images/4.png" alt="stepfour">
            </div>
            <h2>In which book does the character <br> Jay Gatsby appear?</h2>
            <label class="row">
                <input type="radio" name="questionFour" id="answerOne">The Great Gatsby
            </label>
            <label class="row">
                <input type="radio" name="questionFour">Brave New World
            </label>
            <label class="row">
                <input type="radio" name="questionFour">The Sun Also Rises
            </label>
            <label class="row">
                <input type="radio" name="questionFour">On the Road
            </label>
        </div>

        <!-- 5 -->
        <div class="question" id="divFifthQuestion">
            <div class="back-step">
                <img src="../images/5.png" alt="stepfive">
            </div>
            <h2>What is the title of the first book in <br> J.R.R. Tolkien's "The Lord of the Rings" series?</h2>
            <label class="row">
                <input type="radio" name="questionFive">The Return of the King
            </label>
            <label class="row">
                <input type="radio" name="questionFive">The Two Towers
            </label>
            <label class="row">
                <input type="radio" name="questionFive">The Hobbit
            </label>
            <label class="row">
                <input type="radio" name="questionFive" id="answerFour">The Fellowship of the Ring
            </label>
        </div>

        <button class="button" id="btnNext">NEXT</button>
        <button class="button" id="submitBtn">SUBMIT</button>
        <button id="btnSecondary"><a href="index.html">BACK HOME</a></button>
        <p id="show"></p>
    </div>
    <script src="script.js"></script>

</body>

</html>

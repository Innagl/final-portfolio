<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
   <link rel="icon" href="data:,">
   <link rel="stylesheet" href="style.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Playwrite+AU+QLD:wght@100..400&display=swap" rel="stylesheet">
</head>

<body>
   <div id="particles-js"></div>
   <div class="main-container">
      <div class="banner-container">
         <div class="button-h1">
            <h1>Santa Claus <br> is coming to town!</h1>
            <button id="myButton"><svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24"
                  fill="none">
                  <path
                     d="M12 22C17.523 22 22 17.523 22 12C22 6.477 17.523 2 12 2C6.477 2 2 6.477 2 12C2 17.523 6.477 22 12 22Z"
                     stroke="white" stroke-width="2" stroke-linejoin="round" />
                  <path d="M10 12.0001V8.53613L13 10.2681L16 12.0001L13 13.7321L10 15.4641V12.0001Z" stroke="white"
                     stroke-width="2" stroke-linejoin="round" />
               </svg></button>
         </div>
         <div class="container-countdown">
            <!-- 1 -->
            <div class="christmas">
               <div class="block">
                  <h4 class="days"></h4>
                  <h3>DAYS</h3>
               </div>
            </div>
            <!-- 2 -->
            <div class="christmas">
               <div class="block">
                  <h4 class="hours"></h4>
                  <h3>HOURS</h3>
               </div>
            </div>
            <!-- 3 -->
            <div class="christmas">
               <div class="block">
                  <h4 class="minutes"></h4>
                  <h3>MINUTES</h3>
               </div>
            </div>
            <!-- 4 -->
            <div class="christmas">
               <div class="block">
                  <h4 class="seconds"></h4>
                  <h3>SECONDS</h3>

               </div>

            </div>
         </div>
      </div>
      <audio id="myAudio" src="../media/song.mp3" loop="loop" autoplay="allowed"></audio>
      <div class="button-ornament">

         <div class="ornaments">
            <img src="../images/white.png" class="box white">
            <img src="../images/red.png" class="box red">
            <img src="../images/white.png" class="box white">
            <img src="../images/red.png" class="box red">
            <img src="../images/white.png" class="box white">
            <img src="../images/red.png" class="box red">
            <img src="../images/white.png" class="box white">
            <img src="../images/red.png" class="box red">
            <img src="../images/white.png" class="box white">
            <img src="../images/red.png" class="box red">
            <img src="../images/white.png" class="box white">
            <img src="../images/red.png" class="box red">
            <img src="../images/white.png" class="box white">
            <img src="../images/red.png" class="box red">
            <img src="../images/white.png" class="box white">
            <img src="../images/red.png" class="box red">
            <img src="../images/white.png" class="box white">
            <img src="../images/red.png" class="box red">
            <img src="../images/white.png" class="box white">
            <img src="../images/red.png" class="box red">
         </div>
      </div>
   </div>
   <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.7.1/gsap.min.js"></script>
   <script src="script.js"></script>
</body>

</html>
